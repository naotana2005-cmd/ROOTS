<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ROOTS ロゴ比較</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Shippori+Mincho&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Shippori Mincho', serif;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: #F0A032;
      font-size: 28px;
      text-align: center;
      letter-spacing: 2px;
    }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 48px; }

    /* セクション */
    .section { margin-bottom: 64px; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      color: #50A0F0;
      font-size: 18px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 24px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    /* グリッド */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }
    .card {
      text-align: center;
    }
    .card .label {
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .card .desc {
      color: #666;
      font-size: 11px;
      margin-top: 6px;
      max-width: 200px;
    }

    /* 円形プレビュー */
    .circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #333;
      margin: 8px auto 0;
    }
    .circle img { width: 100%; height: 100%; object-fit: cover; }

    /* ボタン */
    .dl-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      background: transparent;
      color: #888;
      border: 1px solid #444;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .dl-btn:hover { background: #F0A032; color: #090909; border-color: #F0A032; }
  </style>
</head>
<body>

  <h1>ROOTS LOGO VARIANTS</h1>
  <p class="subtitle">カラーバリエーションを比較して選ぶ</p>

  <!-- ============ SECTION 1: ロゴのみ ============ -->
  <div class="section">
    <div class="section-title">LOGO ONLY — INSTAGRAM PROFILE (320×320)</div>
    <div class="grid" id="grid-logo"></div>
  </div>

  <!-- ============ SECTION 2: タグライン付き ============ -->
  <div class="section">
    <div class="section-title">WITH TAGLINE — (320×320)</div>
    <div class="grid" id="grid-tagline"></div>
  </div>

  <!-- ============ SECTION 3: 円形クロップ比較 ============ -->
  <div class="section">
    <div class="section-title">CIRCLE CROP PREVIEW — INSTAGRAM上での見え方</div>
    <div class="grid" id="grid-circle"></div>
  </div>

  <script>
    // ---- カラーバリエーション定義 ----
    const variants = [
      {
        id: 'orange',
        label: 'A. オレンジ（現仕様）',
        desc: 'ブランドカラーのオレンジ。CTAと同じ色で統一感がある',
        textColor: '#F0A032',
        bg: '#090909',
      },
      {
        id: 'blue',
        label: 'B. ブルー',
        desc: 'メインアクセントのブルー。知的で落ち着いた印象',
        textColor: '#50A0F0',
        bg: '#090909',
      },
      {
        id: 'gradient-text',
        label: 'C. グラデーション',
        desc: 'ブルー→オレンジのグラデーション。華やかだが仕様書では禁止',
        textColor: 'gradient',
        bg: '#090909',
      },
      {
        id: 'white',
        label: 'D. ホワイト',
        desc: 'シンプルな白文字。クリーンでミニマル',
        textColor: '#e0e0e0',
        bg: '#090909',
      },
      {
        id: 'orange-blue-accent',
        label: 'E. オレンジ + ブルーアクセント',
        desc: 'ROOTSはオレンジ、下にブルーのライン装飾',
        textColor: '#F0A032',
        accent: '#50A0F0',
        bg: '#090909',
      },
      {
        id: 'blue-orange-accent',
        label: 'F. ブルー + オレンジアクセント',
        desc: 'ROOTSはブルー、下にオレンジのライン装飾',
        textColor: '#50A0F0',
        accent: '#F0A032',
        bg: '#090909',
      },
    ];

    document.fonts.ready.then(() => {
      renderAll();
    });

    function renderAll() {
      const gridLogo = document.getElementById('grid-logo');
      const gridTagline = document.getElementById('grid-tagline');
      const gridCircle = document.getElementById('grid-circle');

      variants.forEach(v => {
        // ---- ロゴのみ ----
        const cardLogo = createCard(v);
        const cLogo = createCanvas(200, 200);
        drawLogo(cLogo, 200, v);
        cardLogo.insertBefore(cLogo, cardLogo.querySelector('.desc'));
        addDownloadBtn(cardLogo, cLogo, `roots-logo-${v.id}-320.png`, 320, v, false);
        gridLogo.appendChild(cardLogo);

        // ---- タグライン付き ----
        const cardTag = createCard(v);
        const cTag = createCanvas(200, 200);
        drawLogoWithTagline(cTag, 200, v);
        cardTag.insertBefore(cTag, cardTag.querySelector('.desc'));
        addDownloadBtn(cardTag, cTag, `roots-tagline-${v.id}-320.png`, 320, v, true);
        gridTagline.appendChild(cardTag);

        // ---- 円形プレビュー ----
        const cardCircle = createCard(v);
        const circleDiv = document.createElement('div');
        circleDiv.className = 'circle';
        const circleImg = document.createElement('img');
        circleImg.src = cLogo.toDataURL('image/png');
        circleDiv.appendChild(circleImg);
        cardCircle.insertBefore(circleDiv, cardCircle.querySelector('.desc'));
        gridCircle.appendChild(cardCircle);
      });
    }

    function createCard(v) {
      const card = document.createElement('div');
      card.className = 'card';
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = v.label;
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = v.desc;
      card.appendChild(label);
      card.appendChild(desc);
      return card;
    }

    function createCanvas(w, h) {
      const c = document.createElement('canvas');
      c.width = w;
      c.height = h;
      c.style.borderRadius = '4px';
      c.style.border = '1px solid #333';
      return c;
    }

    function drawLogo(canvas, size, v) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = v.bg;
      ctx.fillRect(0, 0, size, size);

      const fontSize = Math.round(size * 0.3);
      ctx.font = `${fontSize}px "Bebas Neue"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (v.textColor === 'gradient') {
        const grad = ctx.createLinearGradient(size * 0.2, 0, size * 0.8, 0);
        grad.addColorStop(0, '#60B0FF');
        grad.addColorStop(0.5, '#FFC050');
        grad.addColorStop(1, '#FF8030');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = v.textColor;
      }
      ctx.fillText('ROOTS', size / 2, size * 0.48);

      // アクセントライン
      if (v.accent) {
        ctx.fillStyle = v.accent;
        const lineW = size * 0.35;
        ctx.fillRect((size - lineW) / 2, size * 0.62, lineW, 2);
      }
    }

    function drawLogoWithTagline(canvas, size, v) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = v.bg;
      ctx.fillRect(0, 0, size, size);

      const fontSize = Math.round(size * 0.27);
      ctx.font = `${fontSize}px "Bebas Neue"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (v.textColor === 'gradient') {
        const grad = ctx.createLinearGradient(size * 0.2, 0, size * 0.8, 0);
        grad.addColorStop(0, '#60B0FF');
        grad.addColorStop(0.5, '#FFC050');
        grad.addColorStop(1, '#FF8030');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = v.textColor;
      }
      ctx.fillText('ROOTS', size / 2, size * 0.42);

      // アクセントライン
      if (v.accent) {
        ctx.fillStyle = v.accent;
        const lineW = size * 0.35;
        ctx.fillRect((size - lineW) / 2, size * 0.55, lineW, 2);
      }

      // タグライン
      ctx.fillStyle = '#e0e0e0';
      const tagSize = Math.round(size * 0.055);
      ctx.font = `${tagSize}px "Shippori Mincho"`;
      ctx.fillText('親愛なる故郷へ', size / 2, size * 0.62);
    }

    function addDownloadBtn(card, previewCanvas, filename, dlSize, v, withTagline) {
      const btn = document.createElement('button');
      btn.className = 'dl-btn';
      btn.textContent = 'DOWNLOAD PNG';
      btn.onclick = () => {
        const c = document.createElement('canvas');
        c.width = dlSize;
        c.height = dlSize;
        if (withTagline) {
          drawLogoWithTagline(c, dlSize, v);
        } else {
          drawLogo(c, dlSize, v);
        }
        const link = document.createElement('a');
        link.download = filename;
        link.href = c.toDataURL('image/png');
        link.click();
      };
      card.appendChild(btn);
    }
  </script>

</body>
</html>
